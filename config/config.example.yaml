# EcoFlow DELTA 3 NUT bridge configuration.
# Copy to config.yaml and edit for your device.

ecoflow:
  # BLE MAC address of your DELTA 3 (find with: bluetoothctl scan on).
  mac: "AA:BB:CC:DD:EE:FF"
  # Serial number, printed on the unit / shown in the EcoFlow app.
  serial: "P231XXXXXXXXXXXX"
  model: "delta3"
  poll_interval_seconds: 5

  # Encryption handshake. "auto" reads the type from the BLE advertisement.
  # The DELTA 3 uses the encrypted ECDH handshake (type 7), which needs a
  # one-time EcoFlow account user_id (see README "Authentication"). This is used
  # ONLY to derive the local BLE session secret -- no telemetry goes via cloud.
  encrypt_type: "auto"
  user_id: ""   # required for encrypt_type 7; obtain once via the EcoFlow API

ble:
  adapter: "hci0"
  connect_timeout_seconds: 30
  reconnect_backoff_max_seconds: 60
  scan_timeout_seconds: 30

nut:
  device_name: "ecoflow"
  dev_file_path: "/var/run/nut/ecoflow.dev"
  battery_capacity_wh: 1024
  realpower_nominal: 1800
  battery_warning_percent: 35
  battery_runtime_low_seconds: 300
  battery_type: "LiFePO4"
  battery_voltage_nominal: 51.2
  input_transfer_low: 200
  input_transfer_high: 250
  ac_input_present_min_watts: 10
  thresholds:
    low_battery_percent: 25       # triggers OB LB
    critical_battery_percent: 10  # reserved for future auto-cut logic
  static_values:
    input_voltage: 230
    input_frequency: 50
    output_voltage: 230
    output_frequency: 50
    manufacturer: "EcoFlow"
    model: "DELTA 3"
    serial: "P231XXXXXXXXXXXX"

logging:
  level: "INFO"
  format: "json"   # or "console"

# Local control socket. The running daemon listens here so the CLI (and the
# auto-shutdown logic) can send output commands over the daemon's existing BLE
# connection, without stopping the bridge. Must be writable by the service user.
control_socket_path: "/var/run/nut/ecoflow-nut.sock"

# Optional embedded web UI (control + telemetry dashboard). DISABLED by default.
# Runs inside the daemon, so it shares the single BLE connection: the dashboard
# shows live values and control actions go out over the existing link.
# Requires the [web] extra:  pip install ecoflow-nut-bridge[web]
web:
  enabled: false
  host: "0.0.0.0"            # bind address (0.0.0.0 = reachable on the LAN)
  port: 8080
  # Shared secret required for control actions (toggling outputs / auto-shutdown).
  # Leave empty to keep the dashboard read-only. Prefer the ECOFLOW_WEB_TOKEN env
  # var over putting the secret in this file.
  auth_token: ""
  require_auth_for_read: false   # also require the token to view telemetry

# Telemetry history for the web UI's charts. Two backends, both DISABLED by
# default; pick ONE (if both are on, Postgres wins).

# Option A -- Local SQLite. 100% on this host, no server and no extra Python
# dependency (stdlib sqlite3). Best when the bridge should be self-contained
# (e.g. a Raspberry Pi). Just enable it; nothing else to install.
sqlite:
  enabled: false
  path: "/var/lib/ecoflow-nut/telemetry.db"   # persistent file (NOT /var/run)
  table: "ecoflow_samples"
  min_interval_seconds: 30  # min seconds between persisted rows (0 = every frame)
  retention_days: 90        # auto-prune rows older than this (0 = keep forever)

# Option B -- Postgres. For a central/remote database server. Requires the
# [postgres] extra: pip install ecoflow-nut-bridge[postgres]
postgres:
  enabled: false
  # Connection string. Prefer the ECOFLOW_PG_DSN env var over this file.
  dsn: ""                   # e.g. postgresql://ecoflow:secret@unraid-host:5432/ecoflow
  table: "ecoflow_samples"
  min_interval_seconds: 0   # min seconds between persisted rows (0 = every frame)
  retention_days: 0         # auto-prune rows older than this (0 = keep forever)

# Electricity pricing for the web UI's cost estimate. Heures Creuses (off-peak)
# vs Heures Pleines (peak). Cost is metered against AC INPUT (grid draw). All of
# these are also editable live from the web UI's Settings panel (and persisted).
pricing:
  enabled: false            # show cost figures in the dashboard
  currency: "€"
  hc_start: "22:00"         # off-peak window start (may wrap midnight)
  hc_end: "06:00"           # off-peak window end; all other hours are HP
  price_hc: 0.0             # off-peak price per kWh
  price_hp: 0.0             # peak price per kWh

# Where the web UI persists live-edited settings (overlaid on this file at
# startup). Lives in the systemd StateDirectory so it survives restarts.
settings_file: "/var/lib/ecoflow-nut/settings.json"

# Optional auto-shutdown: cut the DELTA 3's output when the battery is critically
# low while on battery. DISABLED by default -- cutting output is destructive.
# The grace period lets NUT clients (Unraid/Synology) finish their own shutdown,
# triggered by the OB LB status, before the inverter is cut.
auto_shutdown:
  enabled: false
  trigger_soc_percent: 10        # arm + cut at/below this SoC (on battery only)
  recover_soc_percent: 15        # disarm once SoC climbs back to this (or AC returns)
  grace_period_seconds: 300      # wait this long after arming before cutting
  # Low-load trigger: when on battery and AC output stays at/below this many
  # watts for load_grace_seconds, cut AC (the protected gear has powered off).
  # Applies at any SoC. Leave null/omit to disable. Example: 15
  min_load_watts: null
  load_grace_seconds: 60
  cut_ac: true                   # turn off AC output
  cut_usb: false                 # KEEP false if the bridge host is USB-powered
  cut_dc: false                  # turn off 12V DC output
  restore_on_recovery: false     # turn outputs back on when power/SoC recovers
