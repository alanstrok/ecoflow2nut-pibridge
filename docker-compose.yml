# Local test deployment (Unraid host "Thor").
# Uses the published multi-arch image from GHCR.
services:
  ecoflow-nut-bridge:
    image: ghcr.io/alanstrok/ecoflow2nut-pibridge:dev
    container_name: ecoflow-nut-bridge
    # host networking: required so the container can see the kernel Bluetooth
    # adapter (hci0 is only exposed in the host network namespace) and so upsd
    # is reachable on the LAN at <host>:3493.
    network_mode: host
    # privileged is required for BLE access; the container runs its own
    # bluetoothd, so no host D-Bus mount is needed.
    privileged: true
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
    restart: unless-stopped
    environment:
      - TZ=America/St_Barthelemy
