# Optional local upsmon configuration.
#
# The bridge itself does NOT require upsmon -- remote clients (Unraid, Synology)
# run their own. This file is provided for users who want a local monitor on the
# bridge host (e.g. the Pi) for logging or local shutdown handling.
#
# "secondary" means this monitor does not control the UPS shutdown; the device
# powering the Pi is the EcoFlow itself, so auto-shutdown is intentionally NOT
# configured here (that is a future iteration -- see README).

MONITOR ecoflow@localhost:4141 1 monuser changeme-monuser secondary

MINSUPPLIES 1
POLLFREQ 5
POLLFREQALERT 5
HOSTSYNC 15
DEADTIME 15

SHUTDOWNCMD "/bin/true"

NOTIFYFLAG ONLINE   SYSLOG
NOTIFYFLAG ONBATT   SYSLOG
NOTIFYFLAG LOWBATT  SYSLOG
NOTIFYFLAG COMMBAD  SYSLOG
NOTIFYFLAG COMMOK   SYSLOG
