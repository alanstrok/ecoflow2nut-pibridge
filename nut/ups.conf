# NUT driver configuration for the EcoFlow NUT bridge.
#
# The bridge daemon writes a dummy-ups state file every poll cycle; the
# dummy-ups driver re-reads it whenever it changes and upsd republishes it.
#
# `port` is the dummy-ups state file. It must match `nut.dev_file_path` in the
# bridge config.yaml (default: /var/run/nut/ecoflow.dev).

maxretry = 3
pollinterval = 2

[ecoflow]
    driver = dummy-ups
    port = /var/run/nut/ecoflow.dev
    desc = "EcoFlow DELTA 3"
